[workspace]
authors = ["Jeff Bowles <jbowles@riskybacon.com>"]
channels = ["conda-forge"]
name = "coding-agent"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
cli = "python -m coding_agent.cli.main"
test = "pytest"
lint = "ruff check src/"
fmt = "ruff format src/"
typecheck = "mypy"
install-hooks = "ln -sf ../../hooks/pre-commit .git/hooks/pre-commit"

[dependencies]
python = ">=3.14.4,<3.15"
anthropic = ">=0.97.0,<0.98"
rich = ">=14.0,<15"
prompt-toolkit = ">=3.0,<4"
pytest = ">=8.0,<9"
pytest-mock = ">=3.14,<4"
ripgrep = ">=14.1.1,<15"
ruff = ">=0.15.11,<0.16"
mypy = ">=1.20.2,<2"
hatchling = ">=1.27.0,<2"

[pypi-dependencies]
coding-agent = { path = ".", editable = true }
