[workspace]
authors = ["Jeff Bowles <jbowles@riskybacon.com>"]
channels = ["conda-forge"]
name = "coding-agent"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
chat = "python -m coding_agent.chat"
read = "python -m coding_agent.read"
lint = "ruff check src/"
fmt = "ruff format src/"
typecheck = "mypy"
install-hooks = "ln -sf ../../hooks/pre-commit .git/hooks/pre-commit"

[dependencies]
python = ">=3.14.4,<3.15"
anthropic = ">=0.97.0,<0.98"
ruff = ">=0.15.11,<0.16"
mypy = ">=1.20.2,<2"
hatchling = ">=1.27.0,<2"

[pypi-dependencies]
coding-agent = { path = ".", editable = true }
